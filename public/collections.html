<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Collections</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
  <style>
    /* Map pins — square ink-bordered, mono numbers, hard offset shadow */
    .num-pin {
      border-radius: 6px; background: var(--chili); color: #fff;
      font: 600 11px/1 'Spline Sans Mono', ui-monospace, monospace; display: flex;
      align-items: center; justify-content: center; text-align: center;
      border: 2px solid var(--ink); box-shadow: 0 2px 0 rgba(22,22,22,.8);
      cursor: pointer; transition: transform .12s;
    }
    .num-pin:hover { transform: scale(1.12); }
    .num-pin.highlighted { background: var(--ink) !important; transform: scale(1.2); box-shadow: 0 2px 0 rgba(22,22,22,.8); }
    .num-pin.been { background: var(--ink); }
    [data-theme="dark"] .num-pin.been { background: #B9B8B0; } /* light gray — distinct from accent, visible on dark tiles */
    .num-pin.closed { background: var(--ink-subtle); }
    .near-me-btn, .reset-view-btn {
      background: var(--surface); border: 1.5px solid var(--ink); border-radius: var(--radius);
      padding: .35rem .7rem; font-size: .72rem; font-weight: 700; cursor: pointer;
      font-family: var(--body); box-shadow: 0 2px 0 rgba(22,22,22,.85); margin-top: 8px;
      color: var(--ink); transition: transform .08s, box-shadow .08s;
    }
    .near-me-btn:hover, .reset-view-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 0 rgba(22,22,22,.85); }
    .reset-view-btn { font-size: .85rem; padding: .3rem .6rem; }
    .user-dot {
      width: 16px; height: 16px; border-radius: 50%; background: var(--chili);
      border: 2.5px solid #fff; box-shadow: 0 2px 6px rgba(52,82,156,.5); position: relative;
    }
    .user-dot::before {
      content: ''; position: absolute; top: 50%; left: 50%;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(52,82,156,.18); animation: user-pulse 2s ease-out infinite;
      transform: translate(-50%,-50%) scale(0.3);
    }
    @keyframes user-pulse {
      0%   { transform: translate(-50%,-50%) scale(0.3); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(1);   opacity: 0; }
    }
    .card.map-highlighted { outline: 2.5px solid var(--ink); outline-offset: -2px; }
    .app-body.map-open .card { cursor: pointer; }

    /* Stats → ledger line: mono text with chili ● separators */
    #stats-bar {
      font-family: var(--mono); font-size: .72rem; color: var(--ink-muted); font-weight: 400;
      padding: .35rem 1.25rem .6rem; display: flex; gap: 1.4rem; flex-wrap: wrap; align-items: center;
      border-bottom: 1px solid var(--line); background: var(--bg);
    }
    #stats-bar .ledger-item b { color: var(--ink); font-weight: 600; }
    #stats-bar .dot { color: var(--chili); }
    #stats-bar .ledger-item.closed { cursor: pointer; }
    #stats-bar .ledger-item.closed:hover { color: var(--chili); }

    /* Random picker modal — "Tonight's Pick" deals in */
    #random-modal {
      display: none; position: fixed; inset: 0; z-index: 9000;
      background: rgba(22,22,22,.55); backdrop-filter: blur(3px);
      align-items: center; justify-content: center; padding: 1rem;
    }
    #random-modal.open { display: flex; }
    #random-modal.open #random-modal-card { animation: deal .25s cubic-bezier(.32,.72,0,1); }
    @keyframes deal {
      from { opacity: 0; transform: rotate(-3deg) translateY(16px); }
      to   { opacity: 1; transform: rotate(0) translateY(0); }
    }
    #random-modal-card {
      background: var(--bg); border-radius: 6px;
      box-shadow: 6px 6px 0 rgba(22,22,22,.9); width: 100%; max-width: 440px;
      overflow: hidden; position: relative; border: 2px solid var(--ink);
    }
    #random-modal-img { width: 100%; height: 220px; object-fit: cover; display: block; background: var(--surface); border-bottom: 2px solid var(--ink); }
    #random-modal-img.no-img { height: 80px; }
    #random-modal-body { padding: 0 0 .25rem; }
    #random-modal-header {
      font-family: var(--mono); font-size: .66rem; font-weight: 600; letter-spacing: .14em;
      text-transform: uppercase; color: var(--chili); padding: 1rem 1.2rem 0;
      display: flex; align-items: center; gap: .4rem;
    }
    #random-modal-name { font-family: var(--display); font-size: 1.7rem; font-weight: 800; letter-spacing: -.03em; line-height: 1.1; padding: .25rem 1.2rem 0; }
    #random-modal-name a { color: inherit; text-decoration: none; }
    #random-modal-name a:hover { color: var(--chili); }
    #random-modal-meta { font-family: var(--mono); font-size: .74rem; color: var(--ink-muted); padding: .5rem 1.2rem 0; display: flex; gap: .4rem; flex-wrap: wrap; align-items: center; }
    #random-modal-location { font-size: .8rem; color: var(--ink-subtle); padding: .35rem 1.2rem 0; }
    #random-modal-tags { display: flex; gap: .3rem; flex-wrap: wrap; padding: .5rem 1.2rem 0; }
    #random-modal-notes { font-size: .8rem; color: var(--ink-muted); padding: .5rem 1.2rem .9rem; font-style: italic; }
    #random-modal-actions {
      display: flex; border-top: 2px solid var(--ink);
    }
    #random-modal-actions .btn-again {
      flex: 1; padding: .85rem; font-size: .88rem; font-weight: 700;
      background: var(--surface); border: none; border-right: 2px solid var(--ink);
      cursor: pointer; color: var(--ink);
      font-family: var(--body); transition: background .1s;
    }
    #random-modal-actions .btn-again:hover { background: var(--line); }
    #random-modal-actions .btn-confirm {
      flex: 1.4; padding: .85rem; font-size: .88rem; font-weight: 700;
      background: var(--chili); color: #fff; border: none;
      cursor: pointer; font-family: var(--body); transition: background .1s;
    }
    #random-modal-actions .btn-confirm:hover { background: var(--blue-hover); }
    #random-modal-close {
      position: absolute; top: .6rem; right: .6rem; z-index: 2;
      background: var(--bg); color: var(--ink); border: 1.5px solid var(--ink);
      width: 26px; height: 26px; border-radius: var(--radius); cursor: pointer;
      font-size: .8rem; line-height: 1; display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>

<script type="module">
if (!localStorage.getItem('yc_auth')) { location.replace('login.html'); throw '' }

import {
  initCollection, loadCollection, getAllTags, getAllCities, filterAndSort,
  starsHtml, categoryLabel, getDisplayImage, renderNotes, getTagMeta,
  geocodeZip, pickRandom, updateBusiness, bulkRemove, isOpenNow, safeColor
} from './app.js'
import { initMap, renderMarkers, highlightMarker, showUserLocation, panToMarker } from './map.js'

// ── State ─────────────────────────────────────────────────────────────────
let filters = { tags: [], price: [], minRating: '', status: '', showClosed: false, showSkip: false, cities: [] }
let sortBy = 'saved'
let maxDistanceMiles = 0
let query = ''
let currentList = []
let leafletMap = null
let mapVisible = false
let mapCollapsed = false

// ── Helpers ───────────────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;') }

// ── Dark mode ─────────────────────────────────────────────────────────────
const darkToggle = document.getElementById('dark-toggle')
function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light')
  darkToggle.textContent = dark ? '☀ Light mode' : '☾ Dark mode'
}
const savedTheme = localStorage.getItem('yc_theme')
applyTheme(savedTheme ? savedTheme === 'dark' : false)
darkToggle.addEventListener('click', () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark'
  applyTheme(!isDark)
  localStorage.setItem('yc_theme', isDark ? 'light' : 'dark')
})

// ── Logout ────────────────────────────────────────────────────────────────
document.getElementById('logout-btn').addEventListener('click', () => {
  localStorage.removeItem('yc_auth')
  location.replace('index.html')
})

// ── Nav menu ──────────────────────────────────────────────────────────────
const navMenuBtn = document.getElementById('nav-menu-btn')
const navMenuDropdown = document.getElementById('nav-menu-dropdown')
navMenuBtn.addEventListener('click', e => { e.stopPropagation(); navMenuDropdown.classList.toggle('open') })
document.addEventListener('click', () => navMenuDropdown.classList.remove('open'))

// ── Search ────────────────────────────────────────────────────────────────
function matchesQuery(biz, q) {
  if (!q) return true
  const lower = q.toLowerCase()
  const fields = [
    biz.name, biz.alias,
    ...(biz.categories || []).map(c => c.title),
    ...(biz.categories || []).map(c => c.alias),
    biz.location?.address1, biz.location?.city, biz.location?.state,
    biz.location?.zip_code, biz.location?.neighborhood,
    biz.phone, biz.display_phone, biz.price,
    ...(biz.tags || []), biz.notes,
    ...(biz.transactions || []),
  ].filter(Boolean).map(s => String(s).toLowerCase())
  return fields.some(f => f.includes(lower))
}

// ── Filter panel ──────────────────────────────────────────────────────────
const drawer = document.getElementById('filter-drawer')
const filterToggleBtn = document.getElementById('btn-filter-toggle')
const searchInput = document.getElementById('search-input')

function openFilters() { drawer.classList.add('open'); filterToggleBtn.classList.add('active') }
function closeFilters() { drawer.classList.remove('open'); filterToggleBtn.classList.remove('active') }

filterToggleBtn.addEventListener('click', e => {
  e.stopPropagation()
  drawer.classList.contains('open') ? closeFilters() : openFilters()
})
document.addEventListener('click', e => {
  if (!drawer.classList.contains('open')) return
  if (drawer.contains(e.target) || e.target.closest('.toolbar')) return
  closeFilters()
})
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeFilters(); searchInput.blur(); closeCardEdits() } })
searchInput.addEventListener('input', e => { query = e.target.value; render() })

function setupChipGroup(id, multi, cb) {
  document.getElementById(id).addEventListener('click', e => {
    const chip = e.target.closest('.chip')
    if (!chip) return
    if (multi) chip.classList.toggle('active')
    else { document.querySelectorAll(`#${id} .chip`).forEach(c => c.classList.remove('active')); chip.classList.add('active') }
    cb(); render()
  })
}
setupChipGroup('status-chips', false, () => { filters.status = document.querySelector('#status-chips .chip.active')?.dataset.val || '' })
setupChipGroup('price-chips', true,  () => { filters.price = [...document.querySelectorAll('#price-chips .chip.active')].map(c => c.dataset.val) })
setupChipGroup('rating-chips', false, () => { filters.minRating = parseFloat(document.querySelector('#rating-chips .chip.active')?.dataset.val) || 0 })
setupChipGroup('tag-chips', true,   () => { filters.tags = [...document.querySelectorAll('#tag-chips .chip.active')].map(c => c.dataset.val) })
setupChipGroup('city-chips', true,  () => { filters.cities = [...document.querySelectorAll('#city-chips .chip.active')].map(c => c.dataset.val) })
setupChipGroup('distance-chips', false, () => { maxDistanceMiles = parseFloat(document.querySelector('#distance-chips .chip.active')?.dataset.val) || 0; render() })
document.getElementById('sort-select').addEventListener('change', e => { sortBy = e.target.value; render() })
document.getElementById('show-closed').addEventListener('change', e => { filters.showClosed = e.target.checked; render() })
document.getElementById('show-skip').addEventListener('change', e => { filters.showSkip = e.target.checked; render() })
document.getElementById('open-now').addEventListener('change', e => { filters.openNow = e.target.checked; render() })
document.getElementById('has-tags').addEventListener('change', e => { filters.hasTags = e.target.checked; render() })

const addrInput = document.getElementById('addr-input')
const addrStatus = document.getElementById('addr-status')
async function applyAddr() {
  const val = addrInput.value.trim()
  if (!val) { window._filterLat = null; window._filterLng = null; addrStatus.textContent = ''; render(); return }
  addrStatus.textContent = '…'
  try {
    const { lat, lng } = await geocodeZip(val)
    window._filterLat = lat; window._filterLng = lng
    addrStatus.textContent = '✓'; render()
  } catch { addrStatus.textContent = '✗ not found' }
}
addrInput.addEventListener('blur', applyAddr)
addrInput.addEventListener('keydown', e => { if (e.key === 'Enter') applyAddr() })

function refreshTagChips() {
  const active = new Set(filters.tags)
  document.getElementById('tag-chips').innerHTML = getAllTags().map(t =>
    `<span class="chip${active.has(t) ? ' active' : ''}" data-val="${escAttr(t)}">${esc(t)}</span>`
  ).join('')
}
function refreshCityChips() {
  const active = new Set(filters.cities)
  document.getElementById('city-chips').innerHTML = getAllCities().map(c =>
    `<span class="chip${active.has(c) ? ' active' : ''}" data-val="${escAttr(c)}">${esc(c)}</span>`
  ).join('')
}

// ── Open-flag time suffix ──────────────────────────────────────────────────
// Reads today's closing / next opening time straight off the stored Yelp
// hours[0].open[] segments (same object that carries is_open_now) — no API call.
function fmtFlagTime(hhmm) {
  if (!hhmm || hhmm.length < 3) return ''
  let h = parseInt(hhmm.slice(0, 2), 10)
  const m = hhmm.slice(2)
  const ap = h >= 12 ? 'p' : 'a'
  h = h % 12 || 12
  return `${h}${m !== '00' ? ':' + m : ''}${ap}`
}
function flagTimeSuffix(biz, openNow) {
  const open = biz.hours?.[0]?.open
  if (!open?.length) return ''
  const now = new Date()
  const day = (now.getDay() + 6) % 7 // Yelp: 0=Mon … 6=Sun
  const time = String(now.getHours()).padStart(2, '0') + String(now.getMinutes()).padStart(2, '0')
  if (openNow) {
    for (const s of open) {
      if (s.day !== day) continue
      const inSeg = s.is_overnight ? (time >= s.start || time < s.end) : (time >= s.start && time < s.end)
      if (inSeg && s.end) return ' · til ' + fmtFlagTime(s.end)
    }
    return ''
  }
  // closed now → soonest upcoming opening (today later, else following days)
  for (let d = 0; d < 7; d++) {
    const checkDay = (day + d) % 7
    const segs = open.filter(s => s.day === checkDay).sort((a, b) => a.start.localeCompare(b.start))
    for (const s of segs) {
      if (d === 0 && s.start <= time) continue
      return ' · opens ' + fmtFlagTime(s.start)
    }
  }
  return ''
}

// ── Card rendering ────────────────────────────────────────────────────────
function renderCard(biz, index) {
  const num = String(index + 1)
  const closed = biz.closed_status === 'closed'
  const imgSrc = getDisplayImage(biz)
  const img = imgSrc
    ? `<img class="card-img" src="${escAttr(imgSrc)}" alt="${escAttr(biz.name)}" loading="lazy" onerror="this.classList.add('broken')">`
    : '<div class="card-img-placeholder"></div>'

  const closedBadge = closed ? '<span class="closed-badge">Closed</span>'
    : biz.closed_status === 'unknown' ? '<span class="warn-badge">Check</span>' : ''

  // Open/closed-now flag — computed LIVE from the weekly hours.open[] segments
  // against the current clock (not Yelp's stale is_open_now snapshot).
  const openState = isOpenNow(biz) // true / false / null (no hours)
  const openFlag = !closed && openState === true ? `<span class="open-flag">OPEN${flagTimeSuffix(biz, true)}</span>`
    : !closed && openState === false ? `<span class="open-flag closed">CLOSED${flagTimeSuffix(biz, false)}</span>` : ''

  // Status rubber-stamp overlaid on the image; "want" shows no stamp (absence = the signal)
  const stamp = biz.status === 'been' ? '<span class="stamp been">Been ✓</span>'
    : biz.status === 'skip' ? '<span class="stamp skip">Skip</span>' : ''

  const dest = [biz.location?.address1, biz.location?.city, biz.location?.state, biz.location?.zip_code].filter(Boolean).join(', ')
  const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(dest || biz.name)}`
  let website = ''
  if (biz.website) { try { website = ` · <a class="card-website" href="${biz.website}" target="_blank" rel="noopener">${new URL(biz.website).hostname.replace('www.','')}</a>` } catch {} }

  const notes = renderNotes(biz.notes)
  const tagMeta = getTagMeta()
  const tags = (biz.tags || []).map(t => {
    const color = safeColor(tagMeta[t]?.color)
    return `<span class="chip" style="font-size:.68rem;padding:.12rem .45rem;color:${color};border-color:${color}55;">${esc(t)}</span>`
  }).join('')

  // Edit panel
  const curStatus = biz.status || 'want'
  const editTagChips = (biz.tags || []).map(t =>
    `<span class="edit-tag-chip" data-tag="${escAttr(t)}">${esc(t)}<button type="button" class="edit-tag-rm" data-action="rm-tag" aria-label="Remove tag">×</button></span>`
  ).join('')

  const editPanel = `
    <div class="card-edit-panel">
      <div class="card-edit-hd">
        <span class="card-edit-hd-label">Edit</span>
        <button type="button" class="card-edit-x" data-action="edit-cancel" aria-label="Close">✕</button>
      </div>
      <div class="card-edit-status-row">
        <button type="button" class="edit-status-btn${curStatus==='want'?' active':''}" data-action="edit-status" data-s="want">Want to go</button>
        <button type="button" class="edit-status-btn${curStatus==='been'?' active':''}" data-action="edit-status" data-s="been">Been</button>
        <button type="button" class="edit-status-btn${curStatus==='skip'?' active':''}" data-action="edit-status" data-s="skip">Skip</button>
      </div>
      <div class="card-edit-tags-section">
        <div class="card-edit-tags-list">${editTagChips}</div>
        <div class="card-edit-tag-input-wrap">
          <input type="text" class="card-edit-tag-input" placeholder="Add tag…" autocomplete="off">
          <div class="card-edit-tag-drop" style="display:none;"></div>
        </div>
      </div>
      <textarea class="card-notes card-edit-notes" placeholder="Notes…" rows="3">${esc(biz.notes || '')}</textarea>
      <div class="card-edit-footer">
        <button type="button" class="btn-sm" data-action="edit-cancel">Cancel</button>
        <button type="button" class="btn-sm active" data-action="edit-save">Save</button>
      </div>
    </div>`

  return `
    <div class="card${closed ? ' closed' : ''}${biz.status === 'skip' ? ' skipped' : ''}" data-id="${biz.id}" data-num="${index + 1}">
      <div class="card-img-wrap">
        ${img}
        <span class="card-num">${num}</span>
        ${closedBadge}
        ${stamp}
        ${openFlag}
      </div>
      <div class="card-body">
        <div class="card-name">${biz.url ? `<a href="${escAttr(biz.url)}" target="_blank" rel="noopener">${esc(biz.name)}</a>` : esc(biz.name)}</div>
        <div class="card-meta">
          ${biz.rating ? `<span class="stars">★ ${biz.rating}</span>` : ''}
          ${biz.review_count ? `<span>${biz.review_count}</span>` : ''}
          ${biz.price ? `<span class="price">${biz.price}</span>` : ''}
          <span class="cat">${esc(categoryLabel(biz))}</span>
        </div>
        ${biz.location?.city ? `<div class="card-location">${esc(biz.location.city)}${biz.location.state ? ', '+esc(biz.location.state) : ''}${website}</div>` : ''}
        ${tags ? `<div class="card-tags">${tags}</div>` : ''}
        ${notes ? `<div class="card-notes-rendered">${notes}</div>` : ''}
      </div>
      <div class="card-actions">
        ${biz.url ? `<a class="btn-sm active" href="${escAttr(biz.url)}" target="_blank" rel="noopener">Yelp</a>` : ''}
        <a class="btn-sm" href="${mapsUrl}" target="_blank" rel="noopener">Directions</a>
        <button type="button" class="btn-sm" data-action="edit-open">Edit</button>
      </div>
      ${editPanel}
    </div>`
}

// ── Inline card edit ──────────────────────────────────────────────────────
function closeCardEdits() {
  document.querySelectorAll('.card.editing').forEach(c => c.classList.remove('editing'))
}

function addTagToPanel(card, tag) {
  if (!tag.trim()) return
  const list = card.querySelector('.card-edit-tags-list')
  const existing = [...list.querySelectorAll('.edit-tag-chip')].map(c => c.dataset.tag)
  if (existing.includes(tag)) return
  const chip = document.createElement('span')
  chip.className = 'edit-tag-chip'
  chip.dataset.tag = tag
  chip.innerHTML = `${esc(tag)}<button type="button" class="edit-tag-rm" data-action="rm-tag">×</button>`
  list.appendChild(chip)
  const input = card.querySelector('.card-edit-tag-input')
  if (input) { input.value = ''; hideTagDrop(card) }
}

function showTagDrop(card, query) {
  const drop = card.querySelector('.card-edit-tag-drop')
  const existing = [...card.querySelectorAll('.edit-tag-chip')].map(c => c.dataset.tag)
  const allTags = getAllTags().filter(t => !existing.includes(t))
  const q = query.toLowerCase()
  const matches = q ? allTags.filter(t => t.toLowerCase().includes(q)) : allTags.slice(0, 10)
  if (!matches.length) { drop.style.display = 'none'; return }
  drop.innerHTML = matches.map(t => `<div class="card-edit-tag-drop-item" data-tag="${escAttr(t)}">${esc(t)}</div>`).join('')
  drop.style.display = 'block'
}

function hideTagDrop(card) {
  const drop = card.querySelector('.card-edit-tag-drop')
  if (drop) drop.style.display = 'none'
}

// Card container: all interactions via delegation
const cardsEl = document.getElementById('cards')

cardsEl.addEventListener('click', e => {
  // Tag drop item
  const dropItem = e.target.closest('.card-edit-tag-drop-item')
  if (dropItem) {
    e.stopPropagation()
    addTagToPanel(dropItem.closest('.card'), dropItem.dataset.tag)
    return
  }

  // Data-action buttons
  const actionEl = e.target.closest('[data-action]')
  if (actionEl) {
    e.stopPropagation()
    const action = actionEl.dataset.action
    const card = actionEl.closest('.card')
    const id = card?.dataset.id

    if (action === 'edit-open') {
      closeCardEdits()
      card.classList.add('editing')
      card.querySelector('.card-edit-tag-input')?.focus()
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' })
      return
    }
    if (action === 'edit-cancel') { card.classList.remove('editing'); return }
    if (action === 'edit-status') {
      const s = actionEl.dataset.s
      card.querySelectorAll('[data-action="edit-status"]').forEach(b => b.classList.toggle('active', b.dataset.s === s))
      return
    }
    if (action === 'rm-tag') { actionEl.closest('.edit-tag-chip')?.remove(); return }
    if (action === 'edit-save') {
      const status = card.querySelector('[data-action="edit-status"].active')?.dataset.s || 'want'
      const tags = [...card.querySelectorAll('.edit-tag-chip')].map(c => c.dataset.tag)
      const notes = card.querySelector('.card-edit-notes')?.value || ''
      updateBusiness(id, { status, tags, notes })
      card.classList.remove('editing')
      render(); renderStatsBar()
      return
    }
    return
  }

  // Notes expand/collapse
  const notesEl = e.target.closest('.card-notes-rendered')
  if (notesEl) {
    notesEl.classList.toggle('expanded')
    return
  }

  // Card click → map sync (skip links, buttons, edit panel)
  if (e.target.closest('a, button, .card-edit-panel')) return
  const card = e.target.closest('.card')
  if (!card || card.classList.contains('editing')) return
  const id = card.dataset.id
  document.querySelectorAll('.card.map-highlighted').forEach(c => c.classList.remove('map-highlighted'))
  card.classList.add('map-highlighted')
  if (mapVisible) { highlightMarker(id); panToMarker(id) }
})

// Tag input autocomplete
cardsEl.addEventListener('input', e => {
  if (!e.target.matches('.card-edit-tag-input')) return
  const card = e.target.closest('.card')
  showTagDrop(card, e.target.value.trim())
})

cardsEl.addEventListener('keydown', e => {
  if (!e.target.matches('.card-edit-tag-input')) return
  if (e.key === 'Enter') {
    e.preventDefault()
    const card = e.target.closest('.card')
    const val = e.target.value.trim()
    if (val) addTagToPanel(card, val)
  } else if (e.key === 'Escape') {
    hideTagDrop(e.target.closest('.card'))
    e.target.closest('.card').classList.remove('editing')
  }
})

// Close tag drop when clicking outside
document.addEventListener('click', e => {
  if (!e.target.closest('.card-edit-tag-input-wrap')) {
    document.querySelectorAll('.card-edit-tag-drop').forEach(d => d.style.display = 'none')
  }
})

// ── Random picker modal ───────────────────────────────────────────────────
const randomModal = document.getElementById('random-modal')

function showRandomModal(biz) {
  if (!biz) return
  const tagMeta = getTagMeta()
  const img = document.getElementById('random-modal-img')
  const src = biz.custom_image || biz.image_url || ''
  if (src) { img.src = src; img.classList.remove('no-img') }
  else { img.src = ''; img.classList.add('no-img') }
  document.getElementById('random-modal-name').innerHTML =
    biz.url ? `<a href="${escAttr(biz.url)}" target="_blank" rel="noopener">${esc(biz.name)}</a>` : esc(biz.name)
  const stars = biz.rating ? `★ ${biz.rating}` : ''
  document.getElementById('random-modal-meta').innerHTML =
    [stars, biz.review_count ? `${biz.review_count} reviews` : '', biz.price || '', categoryLabel(biz)]
      .filter(Boolean).join(' · ')
  const city = [biz.location?.city, biz.location?.state].filter(Boolean).join(', ')
  const dest = [biz.location?.address1, biz.location?.city, biz.location?.state].filter(Boolean).join(', ')
  const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(dest || biz.name)}`
  document.getElementById('random-modal-location').innerHTML =
    city ? `<a href="${mapsUrl}" target="_blank" rel="noopener" style="color:var(--text-subtle);text-decoration:none;">📍 ${esc(city)}</a>` : ''
  document.getElementById('random-modal-tags').innerHTML = (biz.tags || []).map(t => {
    const color = safeColor(tagMeta[t]?.color)
    return `<span class="chip" style="font-size:.68rem;padding:.12rem .45rem;color:${color};border-color:${color}55;">${esc(t)}</span>`
  }).join('')
  document.getElementById('random-modal-notes').innerHTML = renderNotes(biz.notes) || ''
  randomModal.classList.add('open')
  if (mapVisible) { highlightMarker(biz.id); panToMarker(biz.id) }
}

function closeRandomModal() { randomModal.classList.remove('open') }

document.getElementById('btn-random').addEventListener('click', () => {
  if (!currentList.length) return
  showRandomModal(pickRandom(currentList))
})
document.getElementById('random-modal-again').addEventListener('click', () => {
  if (!currentList.length) return
  randomModal.classList.remove('open')
  requestAnimationFrame(() => showRandomModal(pickRandom(currentList)))
})
document.getElementById('random-modal-confirm').addEventListener('click', closeRandomModal)
document.getElementById('random-modal-close').addEventListener('click', closeRandomModal)
randomModal.addEventListener('click', e => { if (e.target === randomModal) closeRandomModal() })
document.addEventListener('keydown', e => {
  if (!randomModal.classList.contains('open')) return
  if (e.key === 'Escape') closeRandomModal()
  if (e.key === ' ') {
    if (document.activeElement === document.getElementById('random-modal-confirm')) return
    e.preventDefault()
    randomModal.classList.remove('open')
    requestAnimationFrame(() => showRandomModal(pickRandom(currentList)))
  }
})

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  const all = loadCollection().filter(b => !b.not_found)
  const searched = query ? all.filter(b => matchesQuery(b, query)) : all
  currentList = filterAndSort(searched, { ...filters, sortBy, maxDistanceMiles })
  const total = all.length
  document.getElementById('count-label').textContent =
    (query || filters.status || filters.price.length || filters.minRating || maxDistanceMiles || filters.cities.length)
      ? `${currentList.length} of ${total}`
      : `${total} places`
  refreshTagChips()
  refreshCityChips()

  const emptyEl = document.getElementById('empty-state')
  if (!currentList.length) { cardsEl.innerHTML = ''; emptyEl.style.display = 'block' }
  else { emptyEl.style.display = 'none'; cardsEl.innerHTML = currentList.map((b, i) => renderCard(b, i)).join('') }

  if (mapVisible && leafletMap) {
    renderMarkers(currentList.map((b, i) => ({ ...b, _num: i + 1 })), id => { highlightMarker(id); scrollCardIntoView(id) })
  }
}

// ── Map panel ─────────────────────────────────────────────────────────────
const appBody = document.getElementById('app-body')
const mapPanel = document.getElementById('map-panel')
const mapToggleBtn = document.getElementById('map-panel-toggle')

function ensureMap() {
  if (leafletMap) return
  leafletMap = initMap('map')
}

function syncMobileTabs(mapOpen) {
  document.getElementById('mobile-tab-list').classList.toggle('active', !mapOpen)
  document.getElementById('mobile-tab-map').classList.toggle('active', mapOpen)
}

function openMap() {
  mapVisible = true
  mapCollapsed = false
  mapPanel.style.width = ''
  appBody.classList.add('map-open')
  mapPanel.classList.remove('collapsed')
  document.getElementById('btn-map-toggle').classList.add('active')
  mapToggleBtn.textContent = '›'
  ensureMap()
  renderMarkers(currentList.map((b, i) => ({ ...b, _num: i + 1 })), id => { highlightMarker(id); scrollCardIntoView(id) })
  setTimeout(() => leafletMap.invalidateSize(), 320)
  syncMobileTabs(true)
}

function closeMap() {
  mapVisible = false
  appBody.classList.remove('map-open')
  mapPanel.classList.remove('collapsed')
  mapPanel.style.width = ''
  document.getElementById('btn-map-toggle').classList.remove('active')
  mapToggleBtn.textContent = '‹'
  syncMobileTabs(false)
}

function toggleCollapseMap() {
  mapCollapsed = !mapCollapsed
  mapPanel.classList.toggle('collapsed', mapCollapsed)
  mapToggleBtn.textContent = mapCollapsed ? '‹' : '›'
  if (!mapCollapsed) setTimeout(() => leafletMap?.invalidateSize(), 320)
}

document.getElementById('btn-map-toggle').addEventListener('click', () => {
  if (mapVisible) closeMap(); else openMap()
})
mapToggleBtn.addEventListener('click', toggleCollapseMap)

// Mobile tab bar
document.getElementById('mobile-tab-list').addEventListener('click', () => closeMap())
document.getElementById('mobile-tab-map').addEventListener('click', () => openMap())

function scrollCardIntoView(id) {
  const card = document.querySelector(`.card[data-id="${id}"]`)
  if (!card) return
  document.querySelectorAll('.card.map-highlighted').forEach(c => c.classList.remove('map-highlighted'))
  card.classList.add('map-highlighted')
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' })
}

// ── Drag-to-resize map ────────────────────────────────────────────────────
const resizeHandle = document.getElementById('map-resize-handle')
let isResizing = false

resizeHandle.addEventListener('mousedown', e => {
  e.preventDefault()
  isResizing = true
  resizeHandle.classList.add('dragging')
  document.body.style.cursor = 'col-resize'
  document.body.style.userSelect = 'none'
})

document.addEventListener('mousemove', e => {
  if (!isResizing) return
  const rect = appBody.getBoundingClientRect()
  const mapWidth = Math.max(240, Math.min(rect.width - 300, rect.right - e.clientX))
  mapPanel.style.width = mapWidth + 'px'
  mapPanel.style.transition = 'none'
  // Sync filter drawer right boundary
  document.getElementById('filter-drawer').style.right = mapWidth + 6 + 'px'
  leafletMap?.invalidateSize()
})

document.addEventListener('mouseup', () => {
  if (!isResizing) return
  isResizing = false
  resizeHandle.classList.remove('dragging')
  document.body.style.cursor = ''
  document.body.style.userSelect = ''
  mapPanel.style.transition = ''
  setTimeout(() => leafletMap?.invalidateSize(), 50)
})

// ── Stats bar ─────────────────────────────────────────────────────────────
function renderStatsBar() {
  const all = loadCollection().filter(b => !b.not_found)
  if (!all.length) return
  const want = all.filter(b => !b.status || b.status === 'want').length
  const been = all.filter(b => b.status === 'been').length
  const skip = all.filter(b => b.status === 'skip').length
  const closed = all.filter(b => b.closed_status === 'closed').length
  const total = all.length
  const bar = document.getElementById('stats-bar')
  bar.style.display = 'flex'
  const sep = '<span class="dot">●</span>'
  bar.innerHTML = [
    `<span class="ledger-item"><b>${total}</b> place${total !== 1 ? 's' : ''}</span>`,
    `<span class="ledger-item"><b>${want}</b> want to go</span>`,
    been   ? `<span class="ledger-item"><b>${been}</b> been</span>` : '',
    skip   ? `<span class="ledger-item"><b>${skip}</b> skip</span>` : '',
    closed ? `<span class="ledger-item closed" id="closed-pill" title="Click to remove all closed"><b>${closed}</b> closed ✕</span>` : '',
  ].filter(Boolean).join(sep)

  document.getElementById('closed-pill')?.addEventListener('click', () => {
    if (!confirm(`Remove all ${closed} permanently closed places?`)) return
    const ids = loadCollection().filter(b => b.closed_status === 'closed').map(b => b.id)
    bulkRemove(ids)
    document.getElementById('closed-banner').style.display = 'none'
    render(); renderStatsBar()
  })
}

// ── Closed banner ─────────────────────────────────────────────────────────
function setupClosedBanner() {
  const count = loadCollection().filter(b => b.closed_status === 'closed').length
  if (!count) return
  const banner = document.getElementById('closed-banner')
  document.getElementById('closed-msg').textContent =
    `${count} place${count !== 1 ? 's' : ''} may have permanently closed.`
  banner.style.display = 'flex'
  const btn = document.createElement('button')
  btn.className = 'banner-btn'
  btn.textContent = 'Remove all'
  btn.addEventListener('click', () => {
    if (!confirm(`Remove all ${count} permanently closed places?`)) return
    const ids = loadCollection().filter(b => b.closed_status === 'closed').map(b => b.id)
    bulkRemove(ids)
    banner.style.display = 'none'
    render(); renderStatsBar()
  })
  banner.appendChild(btn)
}

// ── Geolocation ───────────────────────────────────────────────────────────
navigator.geolocation?.getCurrentPosition(p => {
  window._userLat = p.coords.latitude; window._userLng = p.coords.longitude
  if (leafletMap) showUserLocation(p.coords.latitude, p.coords.longitude)
})

window.addEventListener('collection-updated', () => { render(); renderStatsBar() })
await initCollection()
render()
renderStatsBar()
setupClosedBanner()
</script>
