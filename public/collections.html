<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Collections</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
  <style>
    /* Square numbered pins — Yelp blue, white number */
    .num-pin {
      border-radius: 6px;
      background: #0047FF;
      color: #fff;
      font: 700 11px/1 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,71,255,.4), 0 0 0 2px #fff;
      cursor: pointer;
      transition: transform .15s;
      letter-spacing: -.02em;
    }
    .num-pin:hover { transform: scale(1.12); }
    .num-pin.highlighted {
      background: #0a0a0a !important;
      transform: scale(1.2);
      box-shadow: 0 2px 8px rgba(0,0,0,.4), 0 0 0 2px #fff;
    }
    .num-pin.closed { background: #f03e3e; }
    .near-me-btn, .reset-view-btn {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: .3rem .7rem;
      font-size: .72rem;
      font-weight: 700;
      cursor: pointer;
      font-family: Inter, sans-serif;
      box-shadow: 0 1px 4px rgba(0,0,0,.12);
      margin-top: 8px;
    }
    .near-me-btn:hover, .reset-view-btn:hover { background: #f5f5f5; }
    .reset-view-btn { font-size: .85rem; padding: .28rem .6rem; }
    /* You are here — pulsing red dot */
    .user-dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #e03131;
      border: 2.5px solid #fff;
      box-shadow: 0 2px 8px rgba(224,49,49,.5);
      position: relative;
    }
    .user-dot::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(224,49,49,.18);
      animation: user-pulse 2s ease-out infinite;
      transform: translate(-50%,-50%) scale(0.3);
    }
    @keyframes user-pulse {
      0%   { transform: translate(-50%,-50%) scale(0.3); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(1);   opacity: 0; }
    }

    /* Card highlighted when map pin clicked */
    .card.map-highlighted {
      outline: 2.5px solid #0047FF;
      outline-offset: -2px;
    }

    /* Clickable cards when map is open */
    .app-body.map-open .card { cursor: pointer; }
    .open-now-badge {
      display: inline-block; font-size: .65rem; font-weight: 700;
      padding: .1rem .42rem; border-radius: 4px;
      background: #d3f9d8; color: #2b6e38; letter-spacing: .02em;
    }
    [data-theme="dark"] .open-now-badge { background: #1a3d22; color: #69db7c; }
    .closed-now-badge {
      display: inline-block; font-size: .65rem; font-weight: 700;
      padding: .1rem .42rem; border-radius: 4px;
      background: var(--surface); color: var(--text-subtle); letter-spacing: .02em;
      border: 1px solid var(--border);
    }
    /* Stats summary bar */
    #stats-bar {
      font-size: .75rem; color: var(--text-muted); font-weight: 600;
      padding: .3rem 1rem; display: flex; gap: 1rem; flex-wrap: wrap;
      border-bottom: 1px solid var(--border); background: var(--surface);
    }
    #stats-bar span { display: flex; align-items: center; gap: .25rem; }

    /* ── Random picker modal ── */
    #random-modal {
      display: none;
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,.55);
      align-items: center; justify-content: center;
      padding: 1rem;
    }
    #random-modal.open { display: flex; animation: modal-in .18s ease; }
    @keyframes modal-in {
      from { opacity: 0; transform: scale(.96); }
      to   { opacity: 1; transform: scale(1); }
    }
    #random-modal-card {
      background: var(--bg);
      border-radius: var(--radius);
      box-shadow: 0 8px 40px rgba(0,0,0,.28);
      width: 100%; max-width: 420px;
      overflow: hidden;
      position: relative;
    }
    #random-modal-img {
      width: 100%; height: 200px; object-fit: cover; display: block;
      background: var(--surface);
    }
    #random-modal-img.no-img { height: 80px; }
    #random-modal-body { padding: 1.1rem 1.2rem 1rem; }
    #random-modal-header {
      font-size: .68rem; font-weight: 700; letter-spacing: .07em;
      text-transform: uppercase; color: var(--text-subtle);
      margin-bottom: .4rem; display: flex; align-items: center; gap: .4rem;
    }
    #random-modal-name {
      font-size: 1.25rem; font-weight: 800; letter-spacing: -.03em;
      line-height: 1.2; margin-bottom: .35rem;
    }
    #random-modal-name a { color: inherit; text-decoration: none; }
    #random-modal-name a:hover { text-decoration: underline; }
    #random-modal-meta { font-size: .82rem; color: var(--text-muted); margin-bottom: .3rem; display: flex; gap: .4rem; flex-wrap: wrap; align-items: center; }
    #random-modal-location { font-size: .8rem; color: var(--text-subtle); margin-bottom: .5rem; }
    #random-modal-tags { display: flex; gap: .3rem; flex-wrap: wrap; margin-bottom: .5rem; }
    #random-modal-notes { font-size: .8rem; color: var(--text-muted); }
    #random-modal-actions {
      display: flex; gap: .6rem; padding: .85rem 1.2rem 1rem;
      border-top: 1px solid var(--border);
    }
    #random-modal-actions .btn-again {
      flex: 1; padding: .55rem; font-size: .88rem; font-weight: 700;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); cursor: pointer; color: var(--text);
      font-family: var(--font); transition: background .1s;
    }
    #random-modal-actions .btn-again:hover { background: var(--gray-light); }
    #random-modal-actions .btn-confirm {
      flex: 2; padding: .55rem; font-size: .88rem; font-weight: 700;
      background: var(--blue); color: #fff; border: none;
      border-radius: var(--radius-sm); cursor: pointer;
      font-family: var(--font); transition: opacity .1s;
    }
    #random-modal-actions .btn-confirm:hover { opacity: .88; }
    #random-modal-close {
      position: absolute; top: .6rem; right: .7rem;
      background: rgba(0,0,0,.4); color: #fff; border: none;
      width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
      font-size: .9rem; line-height: 1; display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>

<nav class="nav">
  <span class="nav-logo">Collections</span>
  <div class="nav-menu-wrap">
    <button class="nav-menu-btn" id="nav-menu-btn" aria-label="Menu">☰</button>
    <div class="nav-menu-dropdown" id="nav-menu-dropdown">
      <a class="nav-menu-item" href="collections.html">My List</a>
      <a class="nav-menu-item" href="admin.html">Admin</a>
      <div class="nav-menu-divider"></div>
      <button class="nav-menu-item" id="dark-toggle">Dark mode</button>
      <div class="nav-menu-divider"></div>
      <button class="nav-menu-item" id="logout-btn">Log out</button>
    </div>
  </div>
</nav>

<!-- ── Toolbar ── -->
<div class="toolbar" id="toolbar">
  <div class="search-bar-wrap">
    <div class="search-bar">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="4.5"/><line x1="9.5" y1="9.5" x2="13" y2="13"/></svg>
      <input type="search" id="search-input" placeholder="Search name, cuisine, neighborhood, notes, tags…" autocomplete="off">
      <button id="btn-filter-toggle" class="search-filter-btn">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="1" y1="3" x2="12" y2="3"/><line x1="3" y1="6.5" x2="10" y2="6.5"/><line x1="5" y1="10" x2="8" y2="10"/></svg>
        Filters
      </button>
    </div>
  </div>
  <div class="toolbar-right">
    <span class="toolbar-count" id="count-label"></span>
    <button class="view-btn" id="btn-random" title="Pick a random place from current list">🎲</button>
    <button class="view-btn" id="btn-map-toggle">Map</button>
  </div>
</div>

<div id="closed-banner" class="banner banner-warn" style="display:none;">
  <span id="closed-msg"></span>
</div>
<div id="stats-bar" style="display:none;"></div>

<!-- ── App body: list + collapsible map panel ── -->
<div class="app-body" id="app-body">

  <!-- Filter drawer — anchored to top of list pane, drops down -->
  <div class="filter-drawer" id="filter-drawer">
    <span class="filter-label">Status</span>
    <div class="filter-row" id="status-chips">
      <span class="chip active" data-val="">All</span>
      <span class="chip" data-val="want">Want to Go</span>
      <span class="chip" data-val="been">Been</span>
      <span class="chip" data-val="skip">Skip</span>
    </div>

    <span class="filter-label" style="margin-top:.875rem;display:block;">Price</span>
    <div class="filter-row" id="price-chips">
      <span class="chip" data-val="$">$</span>
      <span class="chip" data-val="$$">$$</span>
      <span class="chip" data-val="$$$">$$$</span>
      <span class="chip" data-val="$$$$">$$$$</span>
    </div>

    <span class="filter-label" style="margin-top:.875rem;display:block;">Rating</span>
    <div class="filter-row" id="rating-chips">
      <span class="chip active" data-val="">Any</span>
      <span class="chip" data-val="3">3+</span>
      <span class="chip" data-val="4">4+</span>
      <span class="chip" data-val="4.5">4.5+</span>
    </div>

    <span class="filter-label" style="margin-top:.875rem;display:block;">Tags</span>
    <div class="filter-row" id="tag-chips"></div>

    <span class="filter-label" style="margin-top:.875rem;display:block;">City</span>
    <div class="filter-row" id="city-chips"></div>

    <span class="filter-label" style="margin-top:.875rem;display:block;">Distance</span>
    <div class="filter-row" id="distance-chips">
      <span class="chip active" data-val="">Any</span>
      <span class="chip" data-val="1">1 mi</span>
      <span class="chip" data-val="3">3 mi</span>
      <span class="chip" data-val="5">5 mi</span>
      <span class="chip" data-val="10">10 mi</span>
    </div>
    <div style="display:flex;align-items:center;gap:.5rem;margin-top:.4rem;">
      <input type="text" id="addr-input" placeholder="Address or ZIP" maxlength="100"
        style="width:160px;padding:.3rem .5rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.82rem;font-family:var(--font);background:var(--bg);color:var(--text);">
      <span id="addr-status" style="font-size:.72rem;color:var(--text-subtle);"></span>
    </div>

    <div style="margin-top:.875rem;display:flex;align-items:flex-end;gap:1rem;flex-wrap:wrap;">
      <div>
        <span class="filter-label" style="display:block;margin-bottom:.35rem;">Sort</span>
        <select class="sort-select" id="sort-select">
          <option value="saved">Date added</option>
          <option value="rating">Rating</option>
          <option value="name">Name A–Z</option>
          <option value="distance">Distance</option>
        </select>
      </div>
      <label style="font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:.4rem;color:var(--text-muted);padding-bottom:.1rem;">
        <input type="checkbox" id="show-closed"> Show closed
      </label>
      <label style="font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:.4rem;color:var(--text-muted);padding-bottom:.1rem;">
        <input type="checkbox" id="show-skip"> Show skipped
      </label>
      <label style="font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:.4rem;color:var(--text-muted);padding-bottom:.1rem;">
        <input type="checkbox" id="open-now"> Open now
      </label>
      <label style="font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:.4rem;color:var(--text-muted);padding-bottom:.1rem;">
        <input type="checkbox" id="has-tags"> Has tag(s)
      </label>
    </div>

  </div>

  <!-- List -->
  <div id="list-container">
    <div class="cards" id="cards"></div>
    <div class="empty" id="empty-state" style="display:none;">
      <h2>Nothing here yet</h2>
      <p>Head to <a href="admin.html">Admin</a> to import your Yelp collections.</p>
    </div>
  </div>

  <!-- Map panel — half page, no list below -->
  <div class="map-panel" id="map-panel">
    <button class="map-panel-toggle" id="map-panel-toggle" title="Collapse map">‹</button>
    <div id="map"></div>
  </div>

</div>


<!-- ── Random Picker Modal ── -->
<div id="random-modal" role="dialog" aria-modal="true" aria-label="Random pick">
  <div id="random-modal-card">
    <button id="random-modal-close" aria-label="Close">✕</button>
    <img id="random-modal-img" src="" alt="">
    <div id="random-modal-body">
      <div id="random-modal-header">🎲 Tonight's Pick</div>
      <div id="random-modal-name"></div>
      <div id="random-modal-meta"></div>
      <div id="random-modal-location"></div>
      <div id="random-modal-tags"></div>
      <div id="random-modal-notes"></div>
    </div>
    <div id="random-modal-actions">
      <button class="btn-again" id="random-modal-again">Pick again</button>
      <button class="btn-confirm" id="random-modal-confirm">That's the one! ✓</button>
    </div>
  </div>
</div>

<footer class="yelp-attr">Powered by <a href="https://www.yelp.com" target="_blank" rel="noopener">Yelp</a></footer>

<script type="module">
if (!localStorage.getItem('yc_auth')) { location.replace('login.html'); throw '' }

import {
  initCollection, loadCollection, getAllTags, getAllCities, filterAndSort,
  starsHtml, categoryLabel, getDisplayImage, renderNotes, getTagMeta, geocodeZip, pickRandom
} from './app.js'
import { initMap, renderMarkers, highlightMarker, showUserLocation, panToMarker } from './map.js'

// ── State ─────────────────────────────────────────────────────────────────
let filters = { tags: [], price: [], minRating: '', status: '', showClosed: false, showSkip: false, cities: [] }
let sortBy = 'saved'
let maxDistanceMiles = 0
let query = ''
let currentList = []
let leafletMap = null
let mapVisible = false
let mapCollapsed = false

// ── Dark mode ─────────────────────────────────────────────────────────────
const darkToggle = document.getElementById('dark-toggle')
function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light')
  darkToggle.textContent = dark ? '☀ Light mode' : '☾ Dark mode'
}
const savedTheme = localStorage.getItem('yc_theme')
applyTheme(savedTheme ? savedTheme === 'dark' : false)
darkToggle.addEventListener('click', () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark'
  applyTheme(!isDark)
  localStorage.setItem('yc_theme', isDark ? 'light' : 'dark')
})

// ── Logout ────────────────────────────────────────────────────────────────
document.getElementById('logout-btn').addEventListener('click', () => {
  localStorage.removeItem('yc_auth')
  location.replace('index.html')
})

// ── Nav menu ──────────────────────────────────────────────────────────────
const navMenuBtn = document.getElementById('nav-menu-btn')
const navMenuDropdown = document.getElementById('nav-menu-dropdown')
navMenuBtn.addEventListener('click', e => { e.stopPropagation(); navMenuDropdown.classList.toggle('open') })
document.addEventListener('click', () => navMenuDropdown.classList.remove('open'))

// ── Comprehensive search ──────────────────────────────────────────────────
function matchesQuery(biz, q) {
  if (!q) return true
  const lower = q.toLowerCase()
  const fields = [
    biz.name,
    biz.alias,
    ...(biz.categories || []).map(c => c.title),
    ...(biz.categories || []).map(c => c.alias),
    biz.location?.address1,
    biz.location?.address2,
    biz.location?.address3,
    biz.location?.city,
    biz.location?.state,
    biz.location?.zip_code,
    biz.location?.neighborhood,
    biz.phone,
    biz.display_phone,
    biz.price,
    ...(biz.tags || []),
    biz.notes,
    ...(biz.transactions || []),
  ].filter(Boolean).map(s => String(s).toLowerCase())
  return fields.some(f => f.includes(lower))
}

// ── Filter panel ──────────────────────────────────────────────────────────
const drawer = document.getElementById('filter-drawer')
const filterToggleBtn = document.getElementById('btn-filter-toggle')
const searchInput = document.getElementById('search-input')

function openFilters() {
  drawer.classList.add('open')
  filterToggleBtn.classList.add('active')
}
function closeFilters() {
  drawer.classList.remove('open')
  filterToggleBtn.classList.remove('active')
}

filterToggleBtn.addEventListener('click', e => {
  e.stopPropagation()
  drawer.classList.contains('open') ? closeFilters() : openFilters()
})

// Clicking anywhere outside drawer + toolbar closes it
document.addEventListener('click', e => {
  if (!drawer.classList.contains('open')) return
  if (drawer.contains(e.target) || e.target.closest('.toolbar')) return
  closeFilters()
})
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeFilters(); searchInput.blur() } })

// Live search
searchInput.addEventListener('input', e => {
  query = e.target.value
  render()
})

function setupChipGroup(id, multi, cb) {
  document.getElementById(id).addEventListener('click', e => {
    const chip = e.target.closest('.chip')
    if (!chip) return
    if (multi) chip.classList.toggle('active')
    else { document.querySelectorAll(`#${id} .chip`).forEach(c => c.classList.remove('active')); chip.classList.add('active') }
    cb()
    render()
  })
}
setupChipGroup('status-chips', false, () => { filters.status = document.querySelector('#status-chips .chip.active')?.dataset.val || '' })
setupChipGroup('price-chips', true,  () => { filters.price = [...document.querySelectorAll('#price-chips .chip.active')].map(c => c.dataset.val) })
setupChipGroup('rating-chips', false, () => { filters.minRating = parseFloat(document.querySelector('#rating-chips .chip.active')?.dataset.val) || 0 })
setupChipGroup('tag-chips', true,   () => { filters.tags = [...document.querySelectorAll('#tag-chips .chip.active')].map(c => c.dataset.val) })
setupChipGroup('city-chips', true,  () => { filters.cities = [...document.querySelectorAll('#city-chips .chip.active')].map(c => c.dataset.val) })
setupChipGroup('distance-chips', false, () => {
  maxDistanceMiles = parseFloat(document.querySelector('#distance-chips .chip.active')?.dataset.val) || 0
  render()
})
document.getElementById('sort-select').addEventListener('change', e => {
  sortBy = e.target.value
  render()
})
document.getElementById('show-closed').addEventListener('change', e => { filters.showClosed = e.target.checked; render() })
document.getElementById('show-skip').addEventListener('change', e => { filters.showSkip = e.target.checked; render() })
document.getElementById('open-now').addEventListener('change', e => { filters.openNow = e.target.checked; render() })
document.getElementById('has-tags').addEventListener('change', e => { filters.hasTags = e.target.checked; render() })

// Address/ZIP geocoding for distance filter
const addrInput = document.getElementById('addr-input')
const addrStatus = document.getElementById('addr-status')
async function applyAddr() {
  const val = addrInput.value.trim()
  if (!val) { window._filterLat = null; window._filterLng = null; addrStatus.textContent = ''; render(); return }
  addrStatus.textContent = '…'
  try {
    const { lat, lng } = await geocodeZip(val)
    window._filterLat = lat
    window._filterLng = lng
    addrStatus.textContent = '✓'
    render()
  } catch { addrStatus.textContent = '✗ not found' }
}
addrInput.addEventListener('blur', applyAddr)
addrInput.addEventListener('keydown', e => { if (e.key === 'Enter') applyAddr() })

function refreshTagChips() {
  const active = new Set(filters.tags)
  document.getElementById('tag-chips').innerHTML = getAllTags().map(t =>
    `<span class="chip${active.has(t) ? ' active' : ''}" data-val="${t}">${t}</span>`
  ).join('')
}

function refreshCityChips() {
  const active = new Set(filters.cities)
  document.getElementById('city-chips').innerHTML = getAllCities().map(c =>
    `<span class="chip${active.has(c) ? ' active' : ''}" data-val="${c}">${c}</span>`
  ).join('')
}

// ── Card rendering ────────────────────────────────────────────────────────
function renderCard(biz, index) {
  const num = String(index + 1)
  const closed = biz.closed_status === 'closed'
  const imgSrc = getDisplayImage(biz)
  const img = imgSrc
    ? `<img class="card-img" src="${imgSrc}" alt="${biz.name}" loading="lazy">`
    : '<div class="card-img-placeholder"></div>'

  const closedBadge = closed ? '<span class="closed-badge">Closed</span>'
    : biz.closed_status === 'unknown' ? '<span class="warn-badge">Check</span>' : ''

  const isOpenNow = biz.hours?.[0]?.is_open_now
  const openNowBadge = !closed && isOpenNow === true ? '<span class="open-now-badge">Open now</span>'
    : !closed && isOpenNow === false ? '<span class="closed-now-badge">Closed now</span>' : ''

  const statusBadge = biz.status === 'been' ? '<span class="status-badge been">Been</span>'
    : biz.status === 'skip' ? '<span class="status-badge skip">Skip</span>' : ''

  const dest = [biz.location?.address1, biz.location?.city, biz.location?.state, biz.location?.zip_code].filter(Boolean).join(', ')
  const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(dest || biz.name)}`
  let website = ''
  if (biz.website) { try { website = ` · <a class="card-website" href="${biz.website}" target="_blank" rel="noopener">${new URL(biz.website).hostname.replace('www.','')}</a>` } catch {} }

  const notes = renderNotes(biz.notes)
  const tagMeta = getTagMeta()
  const tags = (biz.tags || []).map(t => {
    const color = tagMeta[t]?.color || 'var(--text-subtle)'
    return `<span class="chip" style="font-size:.68rem;padding:.12rem .45rem;color:${color};border-color:${color}55;">${t}</span>`
  }).join('')

  return `
    <div class="card${closed ? ' closed' : ''}" data-id="${biz.id}" data-num="${index + 1}">
      <span class="card-num">${num}</span>
      ${closedBadge}
      <div class="card-img-wrap">${img}</div>
      <div class="card-body">
        <div class="card-name"><a href="${biz.url}" target="_blank" rel="noopener">${biz.name}</a></div>
        <div class="card-meta">
          <span class="stars">${starsHtml(biz.rating).replace(/<[^>]+>/g,'')}</span>
          <span>${biz.review_count}</span>
          ${biz.price ? `<span class="price">${biz.price}</span>` : ''}
          <span class="cat">${categoryLabel(biz)}</span>
        </div>
        ${biz.location?.city ? `<div class="card-location">${biz.location.city}${biz.location.state ? ', '+biz.location.state : ''}${website}</div>` : ''}
        ${tags ? `<div class="card-tags" style="margin-top:.35rem;">${tags}</div>` : ''}
        ${statusBadge || openNowBadge ? `<div style="margin-top:.25rem;display:flex;gap:.35rem;flex-wrap:wrap;">${statusBadge}${openNowBadge}</div>` : ''}
        ${notes ? `<div class="card-notes-rendered">${notes}</div>` : ''}
      </div>
      <div class="card-actions">
        <a class="btn-sm active" href="${biz.url}" target="_blank" rel="noopener">Yelp</a>
        <a class="btn-sm" href="${mapsUrl}" target="_blank" rel="noopener">Directions</a>
      </div>
    </div>`
}

// ── Random picker modal ───────────────────────────────────────────────────
const randomModal = document.getElementById('random-modal')

function showRandomModal(biz) {
  if (!biz) return
  const tagMeta = getTagMeta()
  const img = document.getElementById('random-modal-img')
  const src = biz.custom_image || biz.image_url || ''
  if (src) { img.src = src; img.classList.remove('no-img') }
  else { img.src = ''; img.classList.add('no-img') }

  document.getElementById('random-modal-name').innerHTML =
    `<a href="${biz.url}" target="_blank" rel="noopener">${biz.name}</a>`

  const stars = starsHtml(biz.rating).replace(/<[^>]+>/g, '')
  document.getElementById('random-modal-meta').innerHTML =
    [stars, biz.review_count ? `${biz.review_count} reviews` : '', biz.price || '', categoryLabel(biz)]
      .filter(Boolean).join(' · ')

  const city = [biz.location?.city, biz.location?.state].filter(Boolean).join(', ')
  const dest = [biz.location?.address1, biz.location?.city, biz.location?.state].filter(Boolean).join(', ')
  const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(dest || biz.name)}`
  document.getElementById('random-modal-location').innerHTML =
    city ? `<a href="${mapsUrl}" target="_blank" rel="noopener" style="color:var(--text-subtle);text-decoration:none;">📍 ${city}</a>` : ''

  document.getElementById('random-modal-tags').innerHTML = (biz.tags || []).map(t => {
    const color = tagMeta[t]?.color || 'var(--text-subtle)'
    return `<span class="chip" style="font-size:.68rem;padding:.12rem .45rem;color:${color};border-color:${color}55;">${t}</span>`
  }).join('')

  document.getElementById('random-modal-notes').innerHTML = renderNotes(biz.notes) || ''

  randomModal.classList.add('open')
  if (mapVisible) { highlightMarker(biz.id); panToMarker(biz.id) }
}

function closeRandomModal() {
  randomModal.classList.remove('open')
}

document.getElementById('btn-random').addEventListener('click', () => {
  if (!currentList.length) return
  showRandomModal(pickRandom(currentList))
})

document.getElementById('random-modal-again').addEventListener('click', () => {
  if (!currentList.length) return
  randomModal.classList.remove('open')
  requestAnimationFrame(() => showRandomModal(pickRandom(currentList)))
})

document.getElementById('random-modal-confirm').addEventListener('click', closeRandomModal)
document.getElementById('random-modal-close').addEventListener('click', closeRandomModal)
randomModal.addEventListener('click', e => { if (e.target === randomModal) closeRandomModal() })

document.addEventListener('keydown', e => {
  if (!randomModal.classList.contains('open')) return
  if (e.key === 'Escape') closeRandomModal()
  if (e.key === ' ' || e.key === 'Enter') {
    if (document.activeElement === document.getElementById('random-modal-confirm')) return
    e.preventDefault()
    randomModal.classList.remove('open')
    requestAnimationFrame(() => showRandomModal(pickRandom(currentList)))
  }
})

// ── Card click → map sync ─────────────────────────────────────────────────
document.getElementById('cards').addEventListener('click', e => {
  if (e.target.closest('a, button')) return
  const card = e.target.closest('.card')
  if (!card) return
  const id = card.dataset.id
  document.querySelectorAll('.card.map-highlighted').forEach(c => c.classList.remove('map-highlighted'))
  card.classList.add('map-highlighted')
  if (mapVisible) { highlightMarker(id); panToMarker(id) }
})

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  const all = loadCollection().filter(b => !b.not_found)
  const searched = query ? all.filter(b => matchesQuery(b, query)) : all
  currentList = filterAndSort(searched, { ...filters, sortBy, maxDistanceMiles })
  const total = all.length
  document.getElementById('count-label').textContent =
    (query || filters.status || filters.price.length || filters.minRating || maxDistanceMiles || filters.cities.length)
      ? `${currentList.length} of ${total}`
      : `${total} places`
  refreshTagChips()
  refreshCityChips()

  const cardsEl = document.getElementById('cards')
  const emptyEl = document.getElementById('empty-state')
  if (!currentList.length) { cardsEl.innerHTML = ''; emptyEl.style.display = 'block' }
  else { emptyEl.style.display = 'none'; cardsEl.innerHTML = currentList.map((b, i) => renderCard(b, i)).join('') }

  if (mapVisible && leafletMap) {
    renderMarkers(currentList.map((b, i) => ({ ...b, _num: i + 1 })), id => { highlightMarker(id); scrollCardIntoView(id) })
  }
}

// ── Map panel ─────────────────────────────────────────────────────────────
const appBody = document.getElementById('app-body')
const mapPanel = document.getElementById('map-panel')
const mapToggleBtn = document.getElementById('map-panel-toggle')

function ensureMap() {
  if (leafletMap) return
  leafletMap = initMap('map')
}

function openMap() {
  mapVisible = true
  mapCollapsed = false
  appBody.classList.add('map-open')
  mapPanel.classList.remove('collapsed')
  document.getElementById('btn-map-toggle').classList.add('active')
  mapToggleBtn.textContent = '›'
  ensureMap()
  renderMarkers(currentList.map((b, i) => ({ ...b, _num: i + 1 })), id => { highlightMarker(id); scrollCardIntoView(id) })
  setTimeout(() => leafletMap.invalidateSize(), 320)
}

function closeMap() {
  mapVisible = false
  appBody.classList.remove('map-open')
  mapPanel.classList.remove('collapsed')
  document.getElementById('btn-map-toggle').classList.remove('active')
  mapToggleBtn.textContent = '‹'
}

function toggleCollapseMap() {
  mapCollapsed = !mapCollapsed
  mapPanel.classList.toggle('collapsed', mapCollapsed)
  mapToggleBtn.textContent = mapCollapsed ? '‹' : '›'
  if (!mapCollapsed) setTimeout(() => leafletMap?.invalidateSize(), 320)
}

document.getElementById('btn-map-toggle').addEventListener('click', () => {
  if (mapVisible) closeMap(); else openMap()
})
mapToggleBtn.addEventListener('click', toggleCollapseMap)

// When a map pin is clicked, highlight the corresponding card in the list
function scrollCardIntoView(id) {
  const card = document.querySelector(`.card[data-id="${id}"]`)
  if (!card) return
  document.querySelectorAll('.card.map-highlighted').forEach(c => c.classList.remove('map-highlighted'))
  card.classList.add('map-highlighted')
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' })
}


// ── Stats bar ─────────────────────────────────────────────────────────────
function renderStatsBar() {
  const all = loadCollection().filter(b => !b.not_found)
  if (!all.length) return
  const want = all.filter(b => !b.status || b.status === 'want').length
  const been = all.filter(b => b.status === 'been').length
  const skip = all.filter(b => b.status === 'skip').length
  const closed = all.filter(b => b.closed_status === 'closed').length
  const bar = document.getElementById('stats-bar')
  bar.style.display = 'flex'
  bar.innerHTML = [
    want  ? `<span>🍽 ${want} want to go</span>` : '',
    been  ? `<span>✓ ${been} been</span>` : '',
    skip  ? `<span>— ${skip} skip</span>` : '',
    closed? `<span style="color:var(--red,#e03131);">✕ ${closed} closed</span>` : '',
  ].filter(Boolean).join('')
}

// ── Closed banner (from cache only) ──────────────────────────────────────
const closedCount = loadCollection().filter(b => b.closed_status === 'closed').length
if (closedCount) {
  document.getElementById('closed-msg').textContent = `${closedCount} place${closedCount !== 1 ? 's' : ''} may have permanently closed — check Admin.`
  document.getElementById('closed-banner').style.display = 'flex'
}

// ── Geolocation ───────────────────────────────────────────────────────────
navigator.geolocation?.getCurrentPosition(p => {
  window._userLat = p.coords.latitude; window._userLng = p.coords.longitude
  if (leafletMap) showUserLocation(p.coords.latitude, p.coords.longitude)
})

window.addEventListener('collection-updated', () => { render(); renderStatsBar() })
await initCollection()
render()
renderStatsBar()
</script>
</body>
</html>
