<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Discover · Yelp Collections+</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <span class="nav-logo">Yelp Collections+</span>
  <div class="nav-links">
    <a href="index.html" class="nav-link">My List</a>
    <a href="import.html" class="nav-link">Import</a>
    <a href="discover.html" class="nav-link active">Discover</a>
  </div>
</nav>

<div class="rate-bar" id="rate-bar"></div>

<div style="padding: .75rem;">

  <!-- Search bar -->
  <div style="background:#fff;border-radius:12px;padding:1rem;margin-bottom:.75rem;box-shadow:0 1px 4px rgba(0,0,0,.08);">
    <div style="display:flex;gap:.5rem;margin-bottom:.75rem;">
      <input id="search-term" class="import-input" style="margin:0;flex:1;" type="text" placeholder="Food, bars, coffee…">
      <input id="search-location" class="import-input" style="margin:0;width:140px;" type="text" placeholder="Zip or city">
      <button id="btn-location" title="Use my location" style="padding:.4rem .6rem;border:1.5px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-size:1.1rem;">📍</button>
    </div>

    <div style="display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;">
      <select class="sort-select" id="search-price">
        <option value="">Any price</option>
        <option value="1">$</option>
        <option value="1,2">$–$$</option>
        <option value="2,3">$$–$$$</option>
        <option value="3,4">$$$–$$$$</option>
      </select>
      <select class="sort-select" id="search-radius">
        <option value="1600">Within 1 mi</option>
        <option value="4000" selected>Within 2.5 mi</option>
        <option value="8000">Within 5 mi</option>
        <option value="16000">Within 10 mi</option>
      </select>
      <select class="sort-select" id="search-sort">
        <option value="best_match">Best match</option>
        <option value="rating">Rating</option>
        <option value="review_count">Most reviewed</option>
        <option value="distance">Distance</option>
      </select>
      <button id="btn-search" class="btn-primary" style="flex:1;min-width:80px;">Search</button>
    </div>
  </div>

  <!-- Mood picker -->
  <div style="background:#fff;border-radius:12px;padding:1rem;margin-bottom:.75rem;box-shadow:0 1px 4px rgba(0,0,0,.08);">
    <div class="filter-label" style="margin-bottom:.5rem;">What are you feeling?</div>
    <div class="filter-row" id="mood-chips">
      <span class="chip" data-mood="spicy">🌶 Spicy</span>
      <span class="chip" data-mood="cozy">🕯 Cozy</span>
      <span class="chip" data-mood="quick">⚡ Quick</span>
      <span class="chip" data-mood="fancy">✨ Fancy</span>
      <span class="chip" data-mood="adventurous">🌍 Adventurous</span>
      <span class="chip" data-mood="brunch">🥞 Brunch</span>
      <span class="chip" data-mood="drinks">🍸 Drinks</span>
    </div>
  </div>

  <!-- Results -->
  <div id="results-header" style="display:none;font-size:.85rem;color:var(--gray);margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem;">
    <span id="results-count"></span>
    <button id="btn-random-results" class="btn-sm" style="margin-left:auto;">🎲 Pick one</button>
  </div>

  <div class="cards" id="result-cards" style="padding:0;"></div>
  <div id="results-empty" style="display:none;" class="empty">
    <h2>No results</h2>
    <p>Try a different search or mood.</p>
  </div>
  <div id="results-loading" style="display:none;text-align:center;padding:2rem;color:var(--gray);">Searching…</div>
  <div style="text-align:center;padding-bottom:4rem;">
    <button id="btn-load-more" class="btn-sm" style="display:none;margin-top:.5rem;">Load more</button>
  </div>
</div>

<!-- Random modal -->
<div class="modal-overlay" id="random-modal" style="display:none;">
  <div class="modal">
    <h2>🎲 Try this:</h2>
    <div class="picked-name" id="picked-name"></div>
    <div class="picked-meta" id="picked-meta"></div>
    <br>
    <a id="picked-link" href="#" target="_blank" rel="noopener" class="btn-sm active">Open on Yelp</a>
    <button class="modal-close" id="modal-close">Close</button>
  </div>
</div>

<footer class="yelp-attr">Powered by <a href="https://www.yelp.com" target="_blank" rel="noopener">Yelp</a></footer>

<script type="module">
import { searchBusinesses, saveBusiness, loadCollection, pickRandom, starsHtml, categoryLabel, rateLimitStatus } from './app.js'

const MOODS = {
  spicy:       { categories: 'korean,thai,mexican,szechuan', price: '1,2,3', sort_by: 'rating' },
  cozy:        { categories: 'coffee,wine_bars,gastropubs,tearooms', price: '2,3', sort_by: 'rating' },
  quick:       { categories: 'sandwiches,pizza,burgers,hotdogs', price: '1', sort_by: 'distance' },
  fancy:       { categories: 'newamerican,french,japanese,steak', price: '3,4', sort_by: 'rating' },
  adventurous: { categories: 'ethiopian,vietnamese,peruvian,filipino,georgian', price: '2,3', sort_by: 'best_match' },
  brunch:      { categories: 'breakfast_brunch,diners,cafes', price: '1,2,3', sort_by: 'rating' },
  drinks:      { categories: 'bars,cocktailbars,beerbar,wine_bars', price: '2,3', sort_by: 'best_match' },
}

let currentResults = []
let currentOffset = 0
let currentParams = {}
let userLat = null, userLng = null

function updateRateBar() {
  document.getElementById('rate-bar').textContent = 'API budget: ' + rateLimitStatus()
}
updateRateBar()

// Geolocation
navigator.geolocation?.getCurrentPosition(p => {
  userLat = p.coords.latitude
  userLng = p.coords.longitude
})

document.getElementById('btn-location').addEventListener('click', () => {
  navigator.geolocation.getCurrentPosition(p => {
    userLat = p.coords.latitude
    userLng = p.coords.longitude
    document.getElementById('search-location').value = `${p.coords.latitude.toFixed(4)}, ${p.coords.longitude.toFixed(4)}`
  }, () => alert('Could not get your location.'))
})

// Mood chips
document.getElementById('mood-chips').addEventListener('click', e => {
  const chip = e.target.closest('.chip')
  if (!chip) return
  document.querySelectorAll('#mood-chips .chip').forEach(c => c.classList.remove('active'))
  chip.classList.add('active')

  const mood = MOODS[chip.dataset.mood]
  if (!mood) return

  const loc = document.getElementById('search-location').value.trim()
  const params = { ...mood, limit: 20, offset: 0 }
  if (userLat && userLng && !loc) {
    params.latitude = userLat; params.longitude = userLng
  } else if (loc) {
    params.location = loc
  } else {
    alert('Enter a location or allow location access first.')
    return
  }
  doSearch(params)
})

// Search
document.getElementById('btn-search').addEventListener('click', runSearch)
document.getElementById('search-term').addEventListener('keydown', e => { if (e.key === 'Enter') runSearch() })

function runSearch() {
  const term = document.getElementById('search-term').value.trim()
  const loc = document.getElementById('search-location').value.trim()
  const price = document.getElementById('search-price').value
  const radius = document.getElementById('search-radius').value
  const sort_by = document.getElementById('search-sort').value

  const params = { limit: 20, offset: 0 }
  if (term) params.term = term
  if (price) params.price = price
  if (radius) params.radius = radius
  if (sort_by) params.sort_by = sort_by

  if (userLat && userLng && !loc) {
    params.latitude = userLat; params.longitude = userLng
  } else if (loc) {
    params.location = loc
  } else {
    alert('Enter a zip code or city, or allow location access.')
    return
  }
  doSearch(params)
}

async function doSearch(params, append = false) {
  if (!append) {
    currentResults = []
    currentOffset = 0
    document.getElementById('result-cards').innerHTML = ''
  }
  currentParams = params

  document.getElementById('results-loading').style.display = 'block'
  document.getElementById('results-empty').style.display = 'none'
  document.getElementById('btn-load-more').style.display = 'none'

  try {
    const data = await searchBusinesses({ ...params, offset: currentOffset })
    updateRateBar()
    const businesses = data.businesses || []
    currentResults.push(...businesses)

    if (!append) document.getElementById('result-cards').innerHTML = ''
    businesses.forEach(biz => {
      document.getElementById('result-cards').insertAdjacentHTML('beforeend', renderResultCard(biz))
    })

    const total = data.total || 0
    const shown = currentResults.length
    document.getElementById('results-count').textContent = `${shown} of ${total} results`
    document.getElementById('results-header').style.display = 'flex'

    if (shown === 0) {
      document.getElementById('results-empty').style.display = 'block'
      document.getElementById('results-header').style.display = 'none'
    } else if (shown < total && shown < 200) {
      document.getElementById('btn-load-more').style.display = 'inline-block'
    }
  } catch (err) {
    alert('Search failed: ' + err.message)
    updateRateBar()
  }
  document.getElementById('results-loading').style.display = 'none'
}

document.getElementById('btn-load-more').addEventListener('click', () => {
  currentOffset += 20
  doSearch(currentParams, true)
})

// Saved set for quick lookup
function savedIds() {
  return new Set(loadCollection().map(b => b.id))
}

function renderResultCard(biz) {
  const saved = savedIds().has(biz.id)
  const img = biz.image_url
    ? `<img class="card-img" src="${biz.image_url}" alt="${biz.name}" loading="lazy">`
    : '<div class="card-img-placeholder"></div>'
  return `
    <div class="card" data-id="${biz.id}">
      ${img}
      <div class="card-body">
        <div class="card-name"><a href="${biz.url}" target="_blank" rel="noopener">${biz.name}</a></div>
        <div class="card-meta">
          <span>${'★'.repeat(Math.floor(biz.rating))}${biz.rating % 1 >= .5 ? '½' : ''}</span>
          <span>${biz.review_count} reviews</span>
          ${biz.price ? `<span class="price">${biz.price}</span>` : ''}
          <span class="cat">${categoryLabel(biz)}</span>
        </div>
        <div class="card-meta">${[biz.location?.city, biz.distance ? (biz.distance / 1609).toFixed(1) + ' mi' : ''].filter(Boolean).join(' · ')}</div>
      </div>
      <div class="card-actions">
        <button class="btn-sm${saved ? ' active' : ''}" data-save="${biz.id}">${saved ? 'Saved ✓' : 'Save to list'}</button>
        <a class="btn-sm" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(biz.name + ' ' + (biz.location?.city || ''))}" target="_blank" rel="noopener">Directions</a>
      </div>
    </div>`
}

// Save from results
document.getElementById('result-cards').addEventListener('click', e => {
  const btn = e.target.closest('[data-save]')
  if (!btn) return
  const id = btn.dataset.save
  const biz = currentResults.find(b => b.id === id)
  if (!biz) return
  saveBusiness(biz)
  btn.textContent = 'Saved ✓'
  btn.classList.add('active')
})

// Random from results
document.getElementById('btn-random-results').addEventListener('click', () => {
  const pick = pickRandom(currentResults.filter(b => !b.is_closed))
  if (!pick) return
  document.getElementById('picked-name').textContent = pick.name
  document.getElementById('picked-meta').textContent =
    [pick.price, categoryLabel(pick), pick.location?.city].filter(Boolean).join(' · ')
  document.getElementById('picked-link').href = pick.url
  document.getElementById('random-modal').style.display = 'flex'
})
document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('random-modal').style.display = 'none'
})
</script>
</body>
</html>
