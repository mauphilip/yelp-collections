<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Collections</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
  <style>
    /* Numbered rounded-square pins — white with dark number, Infatuation style */
    .num-pin {
      border-radius: 5px;
      background: #ffffff;
      color: #0a0a0a;
      font: 700 11px/1 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      border: none;
      box-shadow: 0 1px 4px rgba(0,0,0,.35), 0 0 0 1px rgba(0,0,0,.08);
      cursor: pointer;
      transition: transform .15s;
      letter-spacing: -.02em;
    }
    .num-pin:hover { transform: scale(1.12); }
    .num-pin.highlighted {
      background: #0047FF !important;
      color: #fff !important;
      transform: scale(1.2);
      box-shadow: 0 2px 8px rgba(0,71,255,.4);
    }
    .num-pin.closed { background: #f03e3e; color: #fff; }

    /* Card highlighted when map pin clicked */
    .card.map-highlighted {
      outline: 2.5px solid #0047FF;
      outline-offset: -2px;
    }
  </style>
</head>
<body>

<nav class="nav">
  <span class="nav-logo">Collections</span>
  <div class="nav-links">
    <a href="index.html" class="nav-link active">Browse</a>
    <a href="discover.html" class="nav-link">Discover</a>
    <a href="admin.html" class="nav-link">Admin</a>
    <button class="dark-toggle" id="dark-toggle">Dark</button>
  </div>
</nav>

<!-- ── Toolbar: Filter left, count center, List/Map right ── -->
<div class="toolbar" id="toolbar">
  <div class="toolbar-left">
    <button class="toolbar-filter-btn" id="filter-toggle-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="1" y1="3.5" x2="13" y2="3.5"/><line x1="3" y1="7" x2="11" y2="7"/><line x1="5" y1="10.5" x2="9" y2="10.5"/></svg>
      Filter
    </button>
    <span class="toolbar-count" id="count-label"></span>
  </div>
  <div class="toolbar-right">
    <button class="view-btn active" id="btn-random">🎲</button>
    <div class="view-seg">
      <button class="seg-btn active" id="btn-list-view">List</button>
      <button class="seg-btn" id="btn-map-view">Map</button>
    </div>
  </div>
</div>

<div id="closed-banner" class="banner banner-warn" style="display:none;">
  <span id="closed-msg"></span>
</div>

<!-- ── App body: list + collapsible map panel ── -->
<div class="app-body" id="app-body">

  <!-- List -->
  <div id="list-container">
    <div class="cards" id="cards"></div>
    <div class="empty" id="empty-state" style="display:none;">
      <h2>Nothing here yet</h2>
      <p>Head to <a href="admin.html">Admin</a> to import your Yelp collections.</p>
    </div>
  </div>

  <!-- Map panel — half page, no list below -->
  <div class="map-panel" id="map-panel">
    <button class="map-panel-toggle" id="map-panel-toggle" title="Collapse map">‹</button>
    <div id="map"></div>
  </div>

</div>

<!-- ── Filter drawer ── -->
<div class="filter-drawer" id="filter-drawer">
  <div class="drawer-handle"></div>

  <span class="filter-label">Status</span>
  <div class="filter-row" id="status-chips">
    <span class="chip active" data-val="">All</span>
    <span class="chip" data-val="want">Want to Go</span>
    <span class="chip" data-val="been">Been There</span>
  </div>

  <span class="filter-label" style="margin-top:.875rem;display:block;">Price</span>
  <div class="filter-row" id="price-chips">
    <span class="chip" data-val="$">$</span>
    <span class="chip" data-val="$$">$$</span>
    <span class="chip" data-val="$$$">$$$</span>
    <span class="chip" data-val="$$$$">$$$$</span>
  </div>

  <span class="filter-label" style="margin-top:.875rem;display:block;">Rating</span>
  <div class="filter-row" id="rating-chips">
    <span class="chip active" data-val="">Any</span>
    <span class="chip" data-val="3">3+</span>
    <span class="chip" data-val="4">4+</span>
    <span class="chip" data-val="4.5">4.5+</span>
  </div>

  <span class="filter-label" style="margin-top:.875rem;display:block;">Tags</span>
  <div class="filter-row" id="tag-chips"></div>

  <div style="margin-top:.875rem;display:flex;align-items:flex-end;gap:1rem;flex-wrap:wrap;">
    <div>
      <span class="filter-label" style="display:block;margin-bottom:.35rem;">Sort</span>
      <select class="sort-select" id="sort-select">
        <option value="saved">Date added</option>
        <option value="rating">Rating</option>
        <option value="name">Name A–Z</option>
        <option value="distance">Distance</option>
      </select>
    </div>
    <label style="font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:.4rem;color:var(--text-muted);padding-bottom:.1rem;">
      <input type="checkbox" id="show-closed"> Show closed
    </label>
  </div>

  <button id="filter-apply-btn" class="btn-primary" style="margin-top:1.25rem;">Apply</button>
</div>

<!-- ── Random modal ── -->
<div class="modal-overlay" id="random-modal" style="display:none;">
  <div class="modal">
    <h2>Tonight you're going to</h2>
    <div class="picked-name" id="picked-name"></div>
    <div class="picked-meta" id="picked-meta"></div>
    <br>
    <a id="picked-link" href="#" target="_blank" rel="noopener" class="btn-sm active" style="display:inline-block;padding:.45rem 1rem;">View on Yelp →</a>
    <button class="modal-close" id="modal-close">Dismiss</button>
  </div>
</div>

<footer class="yelp-attr">Powered by <a href="https://www.yelp.com" target="_blank" rel="noopener">Yelp</a></footer>

<script type="module">
import {
  loadCollection, getAllTags, filterAndSort, pickRandom,
  starsHtml, categoryLabel, getDisplayImage, renderNotes
} from './app.js'
import { initMap, renderMarkers, highlightMarker, centerOnUser } from './map.js'

// ── State ─────────────────────────────────────────────────────────────────
let filters = { tags: [], price: [], minRating: '', status: '', showClosed: false }
let sortBy = 'saved'
let currentList = []
let leafletMap = null
let mapVisible = false
let mapCollapsed = false

// ── Dark mode ─────────────────────────────────────────────────────────────
const darkToggle = document.getElementById('dark-toggle')
function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light')
  darkToggle.textContent = dark ? 'Light' : 'Dark'
}
const savedTheme = localStorage.getItem('yc_theme')
applyTheme(savedTheme ? savedTheme === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches)
darkToggle.addEventListener('click', () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark'
  applyTheme(!isDark)
  localStorage.setItem('yc_theme', isDark ? 'light' : 'dark')
})

// ── Filter drawer ─────────────────────────────────────────────────────────
const drawer = document.getElementById('filter-drawer')
document.getElementById('filter-toggle-btn').addEventListener('click', e => {
  e.stopPropagation()
  drawer.classList.toggle('open')
})
document.getElementById('filter-apply-btn').addEventListener('click', () => { drawer.classList.remove('open'); render() })
document.addEventListener('click', e => {
  if (drawer.classList.contains('open') && !drawer.contains(e.target) && !e.target.closest('#filter-toggle-btn'))
    drawer.classList.remove('open')
})

function setupChipGroup(id, multi, cb) {
  document.getElementById(id).addEventListener('click', e => {
    const chip = e.target.closest('.chip')
    if (!chip) return
    if (multi) chip.classList.toggle('active')
    else { document.querySelectorAll(`#${id} .chip`).forEach(c => c.classList.remove('active')); chip.classList.add('active') }
    cb()
  })
}
setupChipGroup('status-chips', false, () => { filters.status = document.querySelector('#status-chips .chip.active')?.dataset.val || '' })
setupChipGroup('price-chips', true, () => { filters.price = [...document.querySelectorAll('#price-chips .chip.active')].map(c => c.dataset.val) })
setupChipGroup('rating-chips', false, () => { filters.minRating = parseFloat(document.querySelector('#rating-chips .chip.active')?.dataset.val) || 0 })
setupChipGroup('tag-chips', true, () => { filters.tags = [...document.querySelectorAll('#tag-chips .chip.active')].map(c => c.dataset.val) })
document.getElementById('sort-select').addEventListener('change', e => { sortBy = e.target.value })
document.getElementById('show-closed').addEventListener('change', e => { filters.showClosed = e.target.checked })

function refreshTagChips() {
  const active = new Set(filters.tags)
  document.getElementById('tag-chips').innerHTML = getAllTags().map(t =>
    `<span class="chip${active.has(t) ? ' active' : ''}" data-val="${t}">${t}</span>`
  ).join('')
}

// ── Card rendering — numbered, no tags, only status badge ────────────────
function renderCard(biz, index) {
  const num = String(index + 1)
  const closed = biz.closed_status === 'closed'
  const imgSrc = getDisplayImage(biz)
  const img = imgSrc
    ? `<img class="card-img" src="${imgSrc}" alt="${biz.name}" loading="lazy">`
    : '<div class="card-img-placeholder"></div>'

  const closedBadge = closed ? '<span class="closed-badge">Closed</span>'
    : biz.closed_status === 'unknown' ? '<span class="warn-badge">Check</span>' : ''

  const statusBadge = biz.status === 'been' ? '<span class="status-badge been">Been</span>' : ''

  const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(biz.name + ' ' + (biz.location?.city || ''))}`
  let website = ''
  if (biz.website) { try { website = ` · <a class="card-website" href="${biz.website}" target="_blank" rel="noopener">${new URL(biz.website).hostname.replace('www.','')}</a>` } catch {} }

  const notes = renderNotes(biz.notes)

  return `
    <div class="card${closed ? ' closed' : ''}" data-id="${biz.id}" data-num="${index + 1}">
      <span class="card-num">${num}</span>
      ${closedBadge}
      <div class="card-img-wrap">${img}</div>
      <div class="card-body">
        <div class="card-name"><a href="${biz.url}" target="_blank" rel="noopener">${biz.name}</a></div>
        <div class="card-meta">
          <span class="stars">${starsHtml(biz.rating).replace(/<[^>]+>/g,'')}</span>
          <span>${biz.review_count}</span>
          ${biz.price ? `<span class="price">${biz.price}</span>` : ''}
          <span class="cat">${categoryLabel(biz)}</span>
        </div>
        ${biz.location?.city ? `<div class="card-location">${biz.location.city}${biz.location.state ? ', '+biz.location.state : ''}${website}</div>` : ''}
        ${statusBadge ? `<div>${statusBadge}</div>` : ''}
        ${notes ? `<div class="card-notes-rendered">${notes}</div>` : ''}
      </div>
      <div class="card-actions">
        <a class="btn-sm active" href="${biz.url}" target="_blank" rel="noopener">Yelp</a>
        <a class="btn-sm" href="${mapsUrl}" target="_blank" rel="noopener">Directions</a>
      </div>
    </div>`
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  currentList = filterAndSort(loadCollection(), { ...filters, sortBy })
  document.getElementById('count-label').textContent = `${currentList.length} places`
  refreshTagChips()

  const cardsEl = document.getElementById('cards')
  const emptyEl = document.getElementById('empty-state')
  if (!currentList.length) { cardsEl.innerHTML = ''; emptyEl.style.display = 'block' }
  else { emptyEl.style.display = 'none'; cardsEl.innerHTML = currentList.map((b, i) => renderCard(b, i)).join('') }

  if (mapVisible && leafletMap) {
    // Pass numbers (1-based index) along with businesses
    renderMarkers(currentList.map((b, i) => ({ ...b, _num: i + 1 })), id => { highlightMarker(id); scrollCardIntoView(id) })
  }
}

// ── Map panel ─────────────────────────────────────────────────────────────
const appBody = document.getElementById('app-body')
const mapPanel = document.getElementById('map-panel')
const mapToggleBtn = document.getElementById('map-panel-toggle')

function ensureMap() {
  if (leafletMap) return
  leafletMap = initMap('map')
  const NearMe = L.Control.extend({
    onAdd() {
      const btn = L.DomUtil.create('button')
      btn.style.cssText = 'background:#fff;border:1px solid #ddd;border-radius:6px;padding:.28rem .65rem;font-size:.7rem;font-weight:700;cursor:pointer;font-family:Inter,sans-serif;box-shadow:0 1px 4px rgba(0,0,0,.1);'
      btn.textContent = '📍 Near me'
      btn.onclick = () => navigator.geolocation.getCurrentPosition(p => {
        window._userLat = p.coords.latitude; window._userLng = p.coords.longitude
        centerOnUser(p.coords.latitude, p.coords.longitude)
      })
      return btn
    }
  })
  new NearMe({ position: 'topright' }).addTo(leafletMap)
}

function openMap() {
  mapVisible = true
  mapCollapsed = false
  appBody.classList.add('map-open')
  mapPanel.classList.remove('collapsed')
  document.getElementById('btn-map-view').classList.add('active')
  document.getElementById('btn-list-view').classList.remove('active')
  mapToggleBtn.textContent = '›'
  ensureMap()
  renderMarkers(currentList.map((b, i) => ({ ...b, _num: i + 1 })), id => { highlightMarker(id); scrollCardIntoView(id) })
  setTimeout(() => leafletMap.invalidateSize(), 320)
}

function closeMap() {
  mapVisible = false
  appBody.classList.remove('map-open')
  mapPanel.classList.remove('collapsed')
  document.getElementById('btn-list-view').classList.add('active')
  document.getElementById('btn-map-view').classList.remove('active')
  mapToggleBtn.textContent = '‹'
}

function toggleCollapseMap() {
  if (!mapVisible) { openMap(); return }
  mapCollapsed = !mapCollapsed
  mapPanel.classList.toggle('collapsed', mapCollapsed)
  mapToggleBtn.textContent = mapCollapsed ? '‹' : '›'
  if (!mapCollapsed) setTimeout(() => leafletMap?.invalidateSize(), 320)
}

document.getElementById('btn-list-view').addEventListener('click', closeMap)
document.getElementById('btn-map-view').addEventListener('click', openMap)
mapToggleBtn.addEventListener('click', toggleCollapseMap)

// When a map pin is clicked, highlight the corresponding card in the list
function scrollCardIntoView(id) {
  const card = document.querySelector(`.card[data-id="${id}"]`)
  if (!card) return
  // Remove previous highlight
  document.querySelectorAll('.card.map-highlighted').forEach(c => c.classList.remove('map-highlighted'))
  card.classList.add('map-highlighted')
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' })
}

// ── Random picker ─────────────────────────────────────────────────────────
document.getElementById('btn-random').addEventListener('click', () => {
  const pick = pickRandom(currentList.filter(b => b.closed_status !== 'closed'))
  if (!pick) { alert('No open places in your current filtered list!'); return }
  document.getElementById('picked-name').textContent = pick.name
  document.getElementById('picked-meta').textContent =
    [pick.price, categoryLabel(pick), pick.location?.city].filter(Boolean).join(' · ')
  document.getElementById('picked-link').href = pick.url
  document.getElementById('random-modal').style.display = 'flex'
})
document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('random-modal').style.display = 'none'
})

// ── Closed banner (from cache only) ──────────────────────────────────────
const closedCount = loadCollection().filter(b => b.closed_status === 'closed').length
if (closedCount) {
  document.getElementById('closed-msg').textContent = `${closedCount} place${closedCount !== 1 ? 's' : ''} may have permanently closed — check Admin.`
  document.getElementById('closed-banner').style.display = 'flex'
}

// ── Geolocation ───────────────────────────────────────────────────────────
navigator.geolocation?.getCurrentPosition(p => {
  window._userLat = p.coords.latitude; window._userLng = p.coords.longitude
})

window.addEventListener('collection-updated', render)
render()
</script>
</body>
</html>
