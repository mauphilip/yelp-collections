<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Collections</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #111;
      --border: #222;
      --text: #f0f0f0;
      --text-muted: #666;
      --text-subtle: #333;
      --accent: #4d7aff;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* Centered content */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      text-align: center;
      padding: 2rem;
      gap: 1.25rem;
      position: relative;
    }

    .hero-eyebrow {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--text-subtle);
    }

    .hero-title {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 900;
      letter-spacing: -.05em;
      line-height: 1;
      color: var(--text);
      /* subtle shimmer effect */
      background: linear-gradient(135deg, #fff 0%, #888 60%, #fff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 6s linear infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    .hero-sub {
      font-size: 1rem;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: -.01em;
      max-width: 320px;
      line-height: 1.6;
    }

    /* Thin decorative line */
    .hero-rule {
      width: 32px;
      height: 1px;
      background: var(--text-subtle);
      border: none;
    }

    /* Enter CTA */
    .enter-btn {
      display: inline-block;
      margin-top: .5rem;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--text);
      text-decoration: none;
      border-radius: 999px;
      padding: .85rem 2.75rem;
      transition: opacity .2s, transform .15s;
    }
    .enter-btn:hover { opacity: .85; transform: translateY(-1px); text-decoration: none; }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--text-subtle) 1px, transparent 1px),
        linear-gradient(90deg, var(--text-subtle) 1px, transparent 1px);
      background-size: 80px 80px;
      opacity: .07;
      pointer-events: none;
    }

    /* Radial fade to make center pop */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 50%, transparent 0%, var(--bg) 100%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <main class="hero">
    <p class="hero-eyebrow">Private</p>
    <h1 class="hero-title">Collections</h1>
    <hr class="hero-rule">
    <p class="hero-sub">A curated list of places worth visiting.</p>
    <a href="collections.html" class="enter-btn">Enter</a>
  </main>
</body>
</html>
