<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login · Collections</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F4F4EF;            /* butcher paper */
      --surface: #FFFFFF;
      --ink: #161616;
      --ink-muted: #6B6B64;
      --ink-subtle: #A7A79D;
      --line: #E2E2D8;
      --chili: #34529C;         /* dusty cobalt */
      --display: 'Bricolage Grotesque', -apple-system, BlinkMacSystemFont, sans-serif;
      --body: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'Spline Sans Mono', ui-monospace, monospace;
    }

    html, body {
      height: 100%;
      font-family: var(--body);
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      letter-spacing: -.005em;
    }

    /* Faint ledger grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: .5;
      pointer-events: none;
    }

    .back-link {
      position: fixed;
      top: 1.25rem;
      left: 1.5rem;
      font-family: var(--mono);
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: .04em;
      color: var(--ink-muted);
      text-decoration: none;
      transition: color .15s;
      z-index: 10;
    }
    .back-link:hover { color: var(--ink); text-decoration: none; }

    .login-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .login-box {
      width: 100%;
      max-width: 330px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      background: var(--surface);
      border: 1.5px solid var(--ink);
      border-radius: 4px;
      box-shadow: 4px 4px 0 rgba(22,22,22,.85);
      padding: 2rem 1.75rem;
    }

    .login-header {
      text-align: center;
    }
    .login-logo {
      font-family: var(--display);
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -.03em;
      color: var(--ink);
      margin-bottom: .4rem;
    }
    .login-sub {
      font-family: var(--mono);
      font-size: .7rem;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }

    .login-input {
      width: 100%;
      padding: .75rem 1rem;
      background: var(--bg);
      border: 1.5px solid var(--ink);
      border-radius: 4px;
      font-size: 1rem;
      font-family: var(--body);
      color: var(--ink);
      letter-spacing: .15em;
      text-align: center;
      transition: box-shadow .12s;
      outline: none;
    }
    .login-input::placeholder { letter-spacing: normal; color: var(--ink-subtle); }
    .login-input:focus { box-shadow: 0 2px 0 rgba(22,22,22,.85); }
    .login-input.shake {
      animation: shake .4s ease;
      border-color: var(--chili);
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-8px); }
      40%,80%  { transform: translateX(8px); }
    }

    .login-btn {
      width: 100%;
      padding: .75rem 1rem;
      background: var(--ink);
      color: var(--bg);
      border: 1.5px solid var(--ink);
      border-radius: 4px;
      font-size: .875rem;
      font-weight: 700;
      font-family: var(--body);
      cursor: pointer;
      letter-spacing: .01em;
      box-shadow: 0 3px 0 rgba(22,22,22,.85);
      transition: transform .08s, box-shadow .08s;
    }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 0 rgba(22,22,22,.85); }
    .login-btn:active { transform: translateY(0); box-shadow: none; }

    .login-error {
      font-size: .78rem;
      color: var(--chili);
      font-weight: 600;
      text-align: center;
      min-height: 1.1em;
    }

    @media (prefers-reduced-motion: reduce) {
      .login-btn, .login-input { transition: none; }
      .login-input.shake { animation: none; }
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Back</a>

  <div class="login-wrap">
    <div class="login-box">
      <div class="login-header">
        <div class="login-logo">Collections</div>
        <div class="login-sub">Enter password to continue</div>
      </div>

      <form class="login-form" id="login-form">
        <input
          class="login-input"
          type="password"
          id="password-input"
          placeholder="Password"
          autocomplete="current-password"
          autofocus
        >
        <button type="submit" class="login-btn">Enter →</button>
        <div class="login-error" id="login-error"></div>
      </form>
    </div>
  </div>

  <script>
    // Redirect if already logged in (legacy '1' value forces a fresh login)
    const existing = localStorage.getItem('yc_auth')
    if (existing && existing !== '1') location.replace('collections.html')

    const form = document.getElementById('login-form')
    const input = document.getElementById('password-input')
    const errorEl = document.getElementById('login-error')

    function shake(msg) {
      errorEl.textContent = msg
      input.classList.remove('shake')
      void input.offsetWidth // force reflow to restart animation
      input.classList.add('shake')
      input.value = ''
      input.addEventListener('animationend', () => input.classList.remove('shake'), { once: true })
    }

    form.addEventListener('submit', async e => {
      e.preventDefault()
      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: input.value }),
        })
        if (res.ok) {
          const { token } = await res.json()
          localStorage.setItem('yc_auth', token)
          location.replace('collections.html')
        } else if (res.status === 503) {
          shake('Server password not configured')
        } else {
          shake('Incorrect password')
        }
      } catch {
        shake('Network error — try again')
      }
    })
  </script>
</body>
</html>
